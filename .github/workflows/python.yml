name: Python Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'health_api/**'
      - '.github/workflows/python.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'health_api/**'
      - '.github/workflows/python.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./health_api

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If you add testing or linting libraries in the future, install them here:
        # pip install pytest flake8

    - name: Verify Environment
      run: |
        # Simply verifying that the python environment is set up and FastAPI can be imported
        python -c "import fastapi; print('FastAPI installed successfully')"

    # - name: Lint with flake8
