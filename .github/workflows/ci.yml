name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run static analysis
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage || echo "No tests found — skipping"

      - name: Check for secrets
        run: |
          echo "Scanning for potential hardcoded secrets in source code..."
          # Look for patterns that look like API keys or secrets assigned to strings
          if grep -rEn '(api[_-]?key|secret|password|token)\s*[:=]\s*["\x27][A-Za-z0-9]{10,}' lib/ --include="*.dart" | grep -v 'fromEnvironment' | grep -v '//'; then
            echo "::error::Potential hardcoded secrets detected! Please use dart-define or environment variables."
            exit 1
          fi

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vital-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/vital-release-key.jks
            cat > android/key.properties << EOF
            storePassword=${{ secrets.KEYSTORE_PASSWORD }}
            keyPassword=${{ secrets.KEY_PASSWORD }}
            keyAlias=${{ secrets.KEY_ALIAS }}
            storeFile=vital-release-key.jks
            EOF
          else
            echo "::warning::KEYSTORE_BASE64 is missing. Skipping signing setup."
          fi

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vital-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
